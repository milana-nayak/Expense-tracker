<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Expense Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>Expense Tracker</h1>

    <!-- Expense Form -->
   <form id="expense-form">

    <input
        type="text"
        id="expense-name"
        placeholder="Expense Name"
        required>

    <input
        type="number"
        id="expense-amount"
        placeholder="Amount"
        required>

    <select id="expense-category">
        <option value="">Select Category</option>
        <option>Food</option>
        <option>Travel</option>
        <option>Shopping</option>
        <option>Bills</option>
        <option>Education</option>
        <option>Others</option>
    </select>

    <input
        type="date"
        id="expense-date"
        required>

    <button type="submit">
        Add Expense
    </button>

</form>
<ul id="expense-list">

</ul>

<p id="empty-message">
    No expenses added yet.
</p>

    <!-- Total -->
    <div class="summary">

    <h3>
        Total Expense
    </h3>

    <h2>
        ₹<span id="total">0</span>
    </h2>

</div>

  <script src="script.js"></script>
</body>
</html>
